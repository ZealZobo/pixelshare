<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="monetag" content="fcb26c17059376f42985ea9b8ed05233">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="monetag" content="fcb26c17059376f42985ea9b8ed05233">
    <title>Pixel Share — Share Your Vision</title>
    <style>
        :root {
            --bg: #0f0f11;
            --surface: #18181b;
            --surface-2: #232329;
            --text: #f4f4f5;
            --text-dim: #a1a1aa;
            --accent: #8b5cf6;
            --accent-2: #ec4899;
            --border: rgba(255,255,255,0.08);
            --shadow: 0 20px 50px rgba(0,0,0,0.5);
            --radius: 16px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--surface-2);
            border-radius: 4px;
        }

        /* Header */
        header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(15,15,17,0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
        }

        nav {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
        }

        .logo svg {
            width: 28px;
            height: 28px;
            fill: url(#logoGradient);
        }

        .search-box {
            flex: 1;
            max-width: 500px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 0.75rem 1rem 0.75rem 2.5rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 100px;
            color: var(--text);
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s;
        }

        .search-box input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(139,92,246,0.15);
        }

        .search-box svg {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            width: 18px;
            height: 18px;
            color: var(--text-dim);
        }

        .nav-actions {
            display: flex;
            gap: 0.75rem;
        }

        button {
            padding: 0.6rem 1.2rem;
            border-radius: 100px;
            border: none;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            color: white;
            box-shadow: 0 4px 20px rgba(139,92,246,0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(139,92,246,0.4);
        }

        .btn-ghost {
            background: var(--surface);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-ghost:hover {
            background: var(--surface-2);
        }

        /* Hero */
        .hero {
            text-align: center;
            padding: 4rem 2rem 2rem;
            max-width: 800px;
            margin: 0 auto;
        }

        .hero h1 {
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 1rem;
            line-height: 1.1;
        }

        .hero p {
            color: var(--text-dim);
            font-size: 1.1rem;
            margin-bottom: 2rem;
        }

        /* Categories */
        .categories {
            display: flex;
            gap: 0.5rem;
            padding: 0 2rem 2rem;
            max-width: 1400px;
            margin: 0 auto;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .categories::-webkit-scrollbar {
            display: none;
        }

        .chip {
            padding: 0.5rem 1rem;
            border-radius: 100px;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text-dim);
            font-size: 0.85rem;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.3s;
            user-select: none;
        }

        .chip.active, .chip:hover {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        /* Gallery */
        .gallery {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem 4rem;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .card {
            background: var(--surface);
            border-radius: var(--radius);
            overflow: hidden;
            border: 1px solid var(--border);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            position: relative;
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow);
            border-color: rgba(139,92,246,0.3);
        }

        .card-image {
            width: 100%;
            aspect-ratio: 4/3;
            object-fit: cover;
            display: block;
            transition: transform 0.5s;
        }

        .card:hover .card-image {
            transform: scale(1.05);
        }

        .card-body {
            padding: 1rem;
        }

        .card-title {
            font-weight: 600;
            margin-bottom: 0.25rem;
            font-size: 0.95rem;
        }

        .card-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--text-dim);
            font-size: 0.8rem;
        }

        .card-actions {
            display: flex;
            gap: 0.5rem;
        }

        .action-btn {
            padding: 0.4rem;
            border-radius: 50%;
            background: none;
            border: none;
            color: var(--text-dim);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .action-btn:hover {
            background: var(--surface-2);
            color: var(--text);
        }

        .action-btn.liked {
            color: #ef4444;
        }

        .action-btn.liked svg {
            fill: currentColor;
        }

        /* Upload Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            z-index: 200;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .modal-overlay.active {
            display: flex;
            opacity: 1;
        }

        .modal {
            background: var(--surface);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            max-width: 600px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            padding: 2rem;
            transform: scale(0.95);
            transition: transform 0.3s;
        }

        .modal-overlay.active .modal {
            transform: scale(1);
        }

        .modal h2 {
            margin-bottom: 1.5rem;
            font-size: 1.5rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            color: var(--text-dim);
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 0.75rem;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-size: 0.95rem;
            outline: none;
        }

        .form-group input:focus {
            border-color: var(--accent);
        }

        .drop-zone {
            border: 2px dashed var(--border);
            border-radius: 12px;
            padding: 3rem 2rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 1rem;
            position: relative;
        }

        .drop-zone:hover, .drop-zone.dragover {
            border-color: var(--accent);
            background: rgba(139,92,246,0.05);
        }

        .drop-zone input {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
        }

        .preview-img {
            max-width: 100%;
            max-height: 300px;
            border-radius: 8px;
            margin-top: 1rem;
            display: none;
        }

        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 0.75rem;
            margin-top: 1.5rem;
        }

        /* Lightbox */
        .lightbox {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            z-index: 300;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .lightbox.active {
            display: flex;
        }

        .lightbox-img {
            max-width: 90%;
            max-height: 85vh;
            border-radius: 12px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }

        .lightbox-close {
            position: absolute;
            top: 2rem;
            right: 2rem;
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            transition: background 0.3s;
        }

        .lightbox-close:hover {
            background: rgba(255,255,255,0.2);
        }

        .lightbox-info {
            position: absolute;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            border-radius: 100px;
            color: white;
            font-size: 0.9rem;
            text-align: center;
        }

        /* Empty State */
        .empty {
            grid-column: 1 / -1;
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-dim);
        }

        .empty svg {
            width: 64px;
            height: 64px;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: var(--surface);
            color: var(--text);
            padding: 1rem 1.5rem;
            border-radius: 12px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            z-index: 400;
            transform: translateX(150%);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .toast.show {
            transform: translateX(0);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .hero h1 { font-size: 2rem; }
            .gallery { grid-template-columns: 1fr; padding: 0 1rem 2rem; }
            nav { padding: 1rem; flex-wrap: wrap; }
            .search-box { order: 3; width: 100%; max-width: none; }
            .categories { padding: 0 1rem 1rem; }
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card {
            animation: fadeIn 0.5s ease-out backwards;
        }
    </style>
</head>
<body>

    <svg width="0" height="0">
        <defs>
            <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" style="stop-color:#8b5cf6"/>
                <stop offset="100%" style="stop-color:#ec4899"/>
            </linearGradient>
        </defs>
    </svg>

    <header>
        <nav>
            <div class="logo" onclick="app.setCategory('All')">
                <svg viewBox="0 0 24 24">
                    <path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/>
                </svg>
                Pixel Share
            </div>
            <div class="search-box">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
                </svg>
                <input type="text" id="searchInput" placeholder="Search photos..." autocomplete="off">
            </div>
            <div class="nav-actions">
                <button class="btn-ghost" onclick="app.toggleUpload()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
                    </svg>
                    Upload
                </button>
            </div>
        </nav>
    </header>

    <section class="hero">
        <h1>Share Your Vision With the World</h1>
        <p>Upload, discover, and curate stunning photography from creators everywhere.</p>
    </section>

    <div class="categories" id="categories">
        <div class="chip active" data-cat="All">All</div>
        <div class="chip" data-cat="Nature">Nature</div>
        <div class="chip" data-cat="Architecture">Architecture</div>
        <div class="chip" data-cat="People">People</div>
        <div class="chip" data-cat="Technology">Technology</div>
        <div class="chip" data-cat="Abstract">Abstract</div>
        <div class="chip" data-cat="Animals">Animals</div>
    </div>

    <main class="gallery" id="gallery">
        <!-- Cards injected by JS -->
    </main>

    <!-- Upload Modal -->
    <div class="modal-overlay" id="uploadModal">
        <div class="modal">
            <h2>Upload Photo</h2>
            <div class="drop-zone" id="dropZone">
                <input type="file" id="fileInput" accept="image/*">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--text-dim)" stroke-width="1.5">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
                </svg>
                <p style="margin-top: 0.5rem; color: var(--text-dim);">Drag & drop or click to browse</p>
                <img class="preview-img" id="previewImg">
            </div>
            <div class="form-group">
                <label>Title</label>
                <input type="text" id="imgTitle" placeholder="Give your photo a title">
            </div>
            <div class="form-group">
                <label>Category</label>
                <select id="imgCategory">
                    <option>Nature</option>
                    <option>Architecture</option>
                    <option>People</option>
                    <option>Technology</option>
                    <option>Abstract</option>
                    <option>Animals</option>
                </select>
            </div>
            <div class="modal-footer">
                <button class="btn-ghost" onclick="app.toggleUpload()">Cancel</button>
                <button class="btn-primary" onclick="app.submitUpload()">Share Photo</button>
            </div>
        </div>
    </div>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox" onclick="app.closeLightbox()">
        <button class="lightbox-close">&times;</button>
        <img class="lightbox-img" id="lightboxImg" onclick="event.stopPropagation()">
        <div class="lightbox-info" id="lightboxInfo"></div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2">
            <polyline points="20 6 9 17 4 12"/>
        </svg>
        <span id="toastMsg">Success</span>
    </div>

                this.likes = JSON.parse(localStorage.getItem('pixelshare_likes')) || [];
                this.currentCategory = 'All';
                this.searchQuery = '';
                this.currentFile = null;
                this.init();
            }

                return [

                    {id: '4', url: 'https://images.unsplash.com/photo-1518770660439-4636190af475?w=800&q=80', title: 'Circuit Dreams', category: 'Technology', likes: 67, author: 'Yuki Tanaka'},

                    {id: '7', url: 'https://images.unsplash.com/photo-1472214103451-9374bd1c798e?w=800&q=80', title: 'Morning Mist', category: 'Nature', likes: 112, author: 'Lisa Wong'},
                    {id: '8', url: 'https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?w=800&q=80', title: 'Glass Towers', category: 'Architecture', likes: 76, author: 'James Miller'},
                    {id: '9', url: 'https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=800&q=80', title: 'City Soul', category: 'People',
